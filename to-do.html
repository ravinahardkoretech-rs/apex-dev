<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>
  </head>
  <body>
    <style>
      body{
    background-image: url('images/to-do.jfif');
    background-repeat: no-repeat;
    background-size: cover;
}
.container{
    text-align: center;
    border: 10px solid black;
    border-style: inset;
    padding: 20px;
    margin: 80px auto;
    width: fit-content;
}
button{
    border: 2px solid rgb(116, 10, 10);
    background-color: rgb(233, 140, 140);
    font-size: 30px;
}
li{
    padding: 10px 0px;
    list-style-type:upper-roman;
    text-align: left;
    font-size: 30px;
}
ul{
    margin: 10px 130px;
}
h1{
    font-size: 70px;
}


    </style>
    <div class="container">
      <h1>To-Do List</h1>
      <input type="text" id="task" placeholder="Enter a task" style="font-size: 30px;"/>
      <button style="background-color:rgb(44, 177, 44);  border:2px solid rgb(35, 66, 35);" onclick="addTask()">Add</button>
      <ul id="list"></ul>
      <button onclick="clearAll()">Clear All</button>
    </div>
    <script src="to-do.js"></script>
  </body>
</html>
