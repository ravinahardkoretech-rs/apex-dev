<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analog Clock</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background-image: url("images/clock2.jpg");
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background-repeat: no-repeat;
  background-size: cover;
}

.clock{
  width:350px;
  height:350px;
  border-radius:50%;
  background:white;
  border:10px solid #fff;
  position:relative;
  box-shadow:
    0 0 30px rgba(255,255,255,0.3),
    inset 0 0 20px rgba(0,0,0,0.2);
}

.number{
  position:absolute;
  width:100%;
  height:100%;
  text-align:center;
  font-size:1.5rem;
  font-weight:bold;
}

.number1{transform:rotate(30deg);}
.number2{transform:rotate(60deg);}
.number3{transform:rotate(90deg);}
.number4{transform:rotate(120deg);}
.number5{transform:rotate(150deg);}
.number6{transform:rotate(180deg);}
.number7{transform:rotate(210deg);}
.number8{transform:rotate(240deg);}
.number9{transform:rotate(270deg);}
.number10{transform:rotate(300deg);}
.number11{transform:rotate(330deg);}

.number span{
  display:inline-block;
  transform:rotate(calc(-1 * var(--rotate)));
  margin-top:10px;
}

.hand{
  position:absolute;
  bottom:50%;
  left:50%;
  transform-origin:bottom;
  transform:translateX(-50%);
  border-radius:10px;
}

.hour{
  width:8px;
  height:80px;
  background:#111827;
}

.minute{
  width:5px;
  height:110px;
  background:#2563eb;
}

.second{
  width:3px;
  height:130px;
  background:#ef4444;
}

.center{
  position:absolute;
  width:18px;
  height:18px;
  background:black;
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}
</style>
</head>
<body>

<div class="clock">

  <div class="number number1"><span style="--rotate:30deg">1</span></div>
  <div class="number number2"><span style="--rotate:60deg">2</span></div>
  <div class="number number3"><span style="--rotate:90deg">3</span></div>
  <div class="number number4"><span style="--rotate:120deg">4</span></div>
  <div class="number number5"><span style="--rotate:150deg">5</span></div>
  <div class="number number6"><span style="--rotate:180deg">6</span></div>
  <div class="number number7"><span style="--rotate:210deg">7</span></div>
  <div class="number number8"><span style="--rotate:240deg">8</span></div>
  <div class="number number9"><span style="--rotate:270deg">9</span></div>
  <div class="number number10"><span style="--rotate:300deg">10</span></div>
  <div class="number number11"><span style="--rotate:330deg">11</span></div>
  <div class="number number12"><span>12</span></div>

  <div class="hand hour" id="hour"></div>
  <div class="hand minute" id="minute"></div>
  <div class="hand second" id="second"></div>

  <div class="center"></div>
</div>

<script>
const hourHand = document.getElementById("hour");
const minuteHand = document.getElementById("minute");
const secondHand = document.getElementById("second");

function updateClock(){
  const now = new Date();

  const seconds = now.getSeconds();
  const minutes = now.getMinutes();
  const hours = now.getHours();

  const secDeg = seconds * 6;
  const minDeg = minutes * 6 + seconds * 0.1;
  const hourDeg = hours * 30 + minutes * 0.5;

  secondHand.style.transform =
    `translateX(-50%) rotate(${secDeg}deg)`;

  minuteHand.style.transform =
    `translateX(-50%) rotate(${minDeg}deg)`;

  hourHand.style.transform =
    `translateX(-50%) rotate(${hourDeg}deg)`;
}

setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
