<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Brief | ApexDev</title>
    <style>
        body{
            background-color: #050918;
        }
      .brief {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 50px 20px;
        background: #050918;
      }

      .brief-card {
        width: 100%;
        max-width: 800px;
        background: white;
        padding: 40px;
        border-radius: 25px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }

      .brief-card h1 {
        font-size: 3rem;
        text-align: center;
        margin-bottom: 10px;
      }

      .brief-card p {
        text-align: center;
        color: #666;
        margin-bottom: 40px;
      }

      .input-group {
        margin-bottom: 20px;
      }

      .input-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
      }

      .input-group input,
      .input-group select,
      .input-group textarea {
        width: 100%;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 12px;
        outline: none;
      }

      button {
        width: 100%;
        padding: 15px;
        border: none;
        border-radius: 12px;
        color: white;
        font-size: 1rem;
        cursor: pointer;
        background: linear-gradient(90deg, #7758dd, #ff4fd8);
      }
    </style>
  </head>
  <body>
    <section class="brief">
      <div class="brief-card">
        <h1>Project Brief</h1>
        <p>
          Tell us about your project and we'll prepare the perfect solution for
          your business.
        </p>

        <form>
          <div class="input-group">
            <label>Full Name</label>
            <input type="text" placeholder="John Doe" />
          </div>

          <div class="input-group">
            <label>Email Address</label>
            <input type="email" placeholder="john@example.com" />
          </div>

          <div class="input-group">
            <label>Project Type</label>
            <select>
              <option>Business Website</option>
              <option>Portfolio Website</option>
              <option>E-Commerce Store</option>
              <option>Landing Page</option>
              <option>Web Application</option>
            </select>
          </div>

          <div class="input-group">
            <label>Estimated Budget</label>
            <select>
              <option>₹5,000 - ₹10,000</option>
              <option>₹10,000 - ₹25,000</option>
              <option>₹25,000 - ₹50,000</option>
              <option>₹50,000+</option>
            </select>
          </div>

          <div class="input-group">
            <label>Project Description</label>
            <textarea
              rows="6"
              placeholder="Describe your project requirements..."
            ></textarea>
          </div>

          <button type="submit">Submit Project Request</button>
        </form>
      </div>
    </section>
  </body>
</html>
